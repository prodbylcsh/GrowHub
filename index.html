            <h1 id="form-header">REGISTRACE</h1>
            <fieldset>
                <div id="first-name-container">
                    <label for="first-name">Jméno</label>
                    <input type="text" id="first-name" name="firstName" required />
                </div>

                <div id="last-name-container">
                    <label for="last-name">Příjmení</label>
                    <input type="text" id="last-name" name="lastName" required />
                </div>

                <div id="date-of-birth-container">
                    <label for="date-of-birth">Datum narození</label>
                    <input type="date" id="date-of-birth" name="dateOfBirth" required />
                </div>

                <div id="city-container">
                    <label for="city">Město</label>
                    <input type="text" id="city" name="city" required />
                </div>

                <div id="email-container">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required />
                </div>

                <div id="invitation-container">
                    <label for="invitation">Pozvánka od</label>
                    <select id="invitation" name="invitation" required>
                        <option value="">--Vyberte položku--</option>
                        <option value="2">Daniel Hlaváč</option>
                        <option value="3">Lukáš Schöbel</option>
                        <option value="4">Milan Schöbel</option>
                        <option value="5">Tomáš Adam</option>
                        <option value="6">Vojtěch Šedivý</option>
                        <option value="7">Vojtěch Šťastný</option>
                        <option value="1">O komunitě jsem se dozvěděl jinak</option>
                    </select>
                </div>
            </fieldset>

            <div id="newsletter-container">
                <input type="checkbox" name="newsletter" id="newsletter" value="0" />
                <label for="newsletter">Odběr newsletteru</label>
            </div>

            <div id="register-container">
                <button type="submit" id="submit-button">REGISTROVAT SE</button>
                <div id="gdpr-notice">
                    Kliknutím na tlačítko "Registrovat se" beru na vědomí, že mé osobní údaje budou zpracovány za účelem
                    poskytnutí přístupu na Discord server komunity. Podrobné informace o zpracování naleznete <a
                        href="gdpr.html">zde</a>.
                </div>
            </div>
        </form>

    </div>
