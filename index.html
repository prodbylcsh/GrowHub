            <h1 id="form-header">REGISTRACE</h1>
            <fieldset>
                <div id="first-name-container">
                    <div class="label-container">
                        <label for="first-name">Jméno</label><span> *</span>
                    </div>
                    <input type="text" id="first-name" name="firstName" class="form-input" placeholder="Adam"
                        autocomplete="section-name given-name" minlength="1" maxlength="255" required />
                </div>

                <div id="last-name-container">
                    <div class="label-container"><label for="last-name">Příjmení</label><span> *</span></div>
                    <input type="text" id="last-name" name="lastName" class="form-input" placeholder="Novák"
                        minlength="1" maxlength="255" autocomplete="section-name family-name" required />
                </div>

                <div id="date-of-birth-container">
                    <div class="label-container"><label for="date-of-birth">Datum narození</label><span> *</span></div>
                    <input type="date" id="date-of-birth" name="dateOfBirth" autocomplete="off" class="form-input"
                        min="1920-01-01" max="" step="1" value="" required />
                </div>

                <div id="city-container">
                    <div class="label-container"><label for="city">Město</label><span> *</span></div>
                    <input type="text" id="city" name="city" class="form-input" placeholder="Praha"
                        autocomplete="address-level2" minlength="1" maxlength="255" required />
                </div>

                <div id="email-container">
                    <div class="label-container"><label for="email">E-mail</label><span> *</span></div>
                    <input type="email" id="email" name="email" class="form-input" placeholder="vas@email.cz"
                        autocomplete="email" minlength="5" maxlength="254" required />
                </div>

                <div id="invitation-container">
                    <div class="label-container"><label for="invitation">Pozvánka od</label><span> *</span></div>
                    <div class="select-wrapper">
                        <select id="invitation" name="invitation" class="form-input" required>
                            <option value="">--Vyberte položku--</option>
                            <option value="2">Daniel Hlaváč</option>
                            <option value="3">Lukáš Schöbel</option>
                            <option value="4">Milan Schöbel</option>
                            <option value="5">Tomáš Adam</option>
                            <option value="6">Vojtěch Šedivý</option>
                            <option value="7">Vojtěch Šťastný</option>
                            <option value="1">O komunitě jsem se dozvěděl jinak</option>
                        </select>
                        <span class="select-arrow"></span>
                    </div>
                </div>
            </fieldset>

            <div id="newsletter-container">
                <input type="checkbox" name="newsletter" id="newsletter" class="form-input" value="0" />
                <label for="newsletter">Odběr newsletteru</label>
            </div>

            <div id="register-container">
                <button type="submit" id="submit-button">REGISTROVAT SE</button>
                <div id="gdpr-notice">
                    Kliknutím na tlačítko "Registrovat se" beru na vědomí, že mé osobní údaje budou zpracovány za účelem
                    poskytnutí přístupu na Discord server komunity. Podrobné informace o zpracování naleznete <a
                        href="gdpr.html">zde</a>.
                </div>
            </div>
        </form>

    </div>

</html>
